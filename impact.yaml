# Configuration for the impact CLI (built from action/), run by
# .github/workflows/impact-analysis.yml on pull requests.
#
# ${VAR} references expand from the environment at load time. The Anthropic
# API key is picked up from ANTHROPIC_API_KEY automatically.

agent:
  provider: anthropic
  model: claude-opus-4-8

datasources:
  insights:
    # The Insights query API over NATS ($INS.db.*).
    endpoint: ${INSIGHTS_NATS_SERVER}
    creds: ${INSIGHTS_NATS_CREDS}
  prometheus:
    # Infrastructure-layer metrics for the lab cluster: kube-state-metrics,
    # node-exporter, and the NATS prom-exporter sidecar. Basic auth is
    # enforced at the ingress.
    url: https://prometheus.gcp.iamusingtheinternet.com
    username: impact
    password: ${PROMETHEUS_PASSWORD}
  # The natsdocs knowledge source (embedded nats-op-costs corpus on client
  # operation costs) is on by default and needs no configuration; uncomment
  # to disable it.
  # natsdocs:
  #   enabled: false
